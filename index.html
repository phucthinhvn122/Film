<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="StreamFlix - Xem phim HD miễn phí, cập nhật nhanh nhất">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StreamFlix">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>StreamFlix</title>
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" crossorigin onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" crossorigin onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="/style.css?v=2">
</head>
<body>

<header id="header">
  <div class="header-left">
    <div class="logo" onclick="App.goHome()">NET<span>FLIX</span></div>
    <nav class="nav-links" aria-label="Điều hướng chính">
      <a href="#" id="nav-home" class="active" onclick="App.goHome();return false">Trang chủ</a>
      <a href="#" onclick="App.browseCategory('phim-bo');return false">Phim T.hình</a>
      <a href="#" onclick="App.browseCategory('phim-le');return false">Phim</a>
      <a href="#" onclick="App.openSearchPage();return false">Mới &amp; Phổ biến</a>
    </nav>
  </div>
  <div class="header-right">
    <button class="top-icon-btn" type="button" title="Tìm kiếm" aria-label="Tìm kiếm" onclick="App.openSearchPage()"><i class="fa-solid fa-magnifying-glass"></i></button>
    <button class="top-icon-btn" type="button" title="Thông báo" aria-label="Thông báo"><i class="fa-regular fa-bell"></i></button>
    <img class="profile-avatar" src="https://i.pravatar.cc/64?img=12" alt="Hồ sơ" loading="lazy">
    <form class="search-box" onsubmit="App.search(event)">
      <input id="q" type="text" placeholder="Tìm phim..." autocomplete="off">
      <button type="submit" title="Tìm kiếm" aria-label="Tìm kiếm"><i class="fa-solid fa-magnifying-glass"></i><span class="sr-only">Tìm kiếm</span></button>
    </form>
    <div class="hamburger" id="hamburger" onclick="App.toggleDrawer()">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</header>

<div class="mob-drawer" id="drawer" onclick="App.toggleDrawer(false)">
  <div class="mob-drawer-inner" onclick="event.stopPropagation()">
    <div class="drawer-title">NET<span>FLIX</span></div>
    <form class="mob-search" onsubmit="App.search(event);App.toggleDrawer(false)">
      <input id="q-mob" type="text" placeholder="Tìm phim..." autocomplete="off">
      <button type="submit" title="Tìm kiếm" aria-label="Tìm kiếm"><i class="fa-solid fa-magnifying-glass"></i><span class="sr-only">Tìm kiếm</span></button>
    </form>
    <a href="#" onclick="App.goHome();App.toggleDrawer(false);return false"><i class="fa-solid fa-house icon-w20"></i> Trang chủ</a>
    <a href="#" onclick="App.browseCategory('phim-bo');App.toggleDrawer(false);return false"><i class="fa-solid fa-tv icon-w20"></i> Phim T.hình</a>
    <a href="#" onclick="App.browseCategory('phim-le');App.toggleDrawer(false);return false"><i class="fa-solid fa-film icon-w20"></i> Phim</a>
    <a href="#" onclick="App.openSearchPage();App.toggleDrawer(false);return false"><i class="fa-solid fa-fire icon-w20"></i> Mới &amp; Phổ biến</a>

  </div>
</div>

<main id="main"></main>

<nav class="mobile-bottom-nav" aria-label="Điều hướng nhanh">
  <button type="button" class="mb-nav-item active" data-tab="home" onclick="App.goHome()"><i class="fa-solid fa-house"></i><span>Home</span></button>
  <button type="button" class="mb-nav-item" data-tab="search" onclick="App.openSearchPage()"><i class="fa-solid fa-magnifying-glass"></i><span>Tìm</span></button>
  <button type="button" class="mb-nav-item" data-tab="history" onclick="App.openHistoryPage()"><i class="fa-solid fa-clock-rotate-left"></i><span>Lịch sử</span></button>
  <button type="button" class="mb-nav-item" data-tab="favorites" onclick="App.openFavoritesPage()"><i class="fa-solid fa-heart"></i><span>Yêu thích</span></button>
</nav>

<script src="/app.js?v=2"></script>
</body>
</html>
